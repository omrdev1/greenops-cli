name: "GreenOps PR Analysis"
description: "Analyses a Terraform plan for carbon & cost impact and posts a PR comment"
inputs:
  plan-file:
    description: "Path to terraform plan json"
    required: true
  github-token:
    description: "GitHub token for commenting"
    required: true
  show-upgrade-prompt:
    description: "Enable opt-out dashboard upsell trigger"
    required: false
    default: 'true'
  api-key:
    description: "Optional secret API key for GreenOps Dashboard telemetry (masks automatically as GitHub Secret)"
    required: false
runs:
  using: "composite"
  steps:
    - name: Run GreenOps CLI
      id: run-cli
      shell: bash
      run: |
        node ${{ github.action_path }}/dist/index.cjs diff ${{ inputs.plan-file }} --format markdown --show-upgrade-prompt=${{ inputs.show-upgrade-prompt }} > greenops-output.md
        
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "comment_body<<$EOF" >> "$GITHUB_OUTPUT"
        cat greenops-output.md >> "$GITHUB_OUTPUT"
        echo "$EOF" >> "$GITHUB_OUTPUT"

    - name: Post or Update PR Comment
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { owner, repo, number } = context.issue;
          if (!number) return;
          
          const body = `${{ steps.run-cli.outputs.comment_body }}`;
          const comments = await github.rest.issues.listComments({ owner, repo, issue_number: number });
          const existing = comments.data.find(c => c.body.includes('Open GreenOps Methodology Ledger'));
          
          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
          }

    - name: Run GreenOps CLI (JSON) & Upload Telemetry
      if: inputs.api-key != ''
      shell: bash
      run: |
        node ${{ github.action_path }}/dist/index.cjs diff ${{ inputs.plan-file }} --format json > result.json
        
        jq --arg repo "$GITHUB_REPOSITORY" \
           --arg pr "${{ github.event.pull_request.number }}" \
           --arg sha "$GITHUB_SHA" \
           --arg ref "$GITHUB_REF" \
           '{ repository: $repo, pull_request_number: ($pr | tonumber), commit_sha: $sha, ref: $ref, analysis: . }' result.json > upload.json
           
        curl -f -X POST https://api.greenops-cli.dev/ingest \
          -H "Authorization: Bearer ${{ inputs.api-key }}" \
          -H "Content-Type: application/json" \
          -d @upload.json || true
