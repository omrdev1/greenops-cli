name: "GreenOps PR Analysis"
description: "Analyses a Terraform plan for carbon & cost impact, enforces policy budgets, and posts inline Terraform suggestions on the PR"
branding:
  icon: activity
  color: green
inputs:
  plan-file:
    description: "Path to terraform plan JSON file"
    required: true
  github-token:
    description: "GitHub token for posting PR comments and suggestions"
    required: true
  post-suggestions:
    description: "Post inline Terraform suggestion comments on the PR (one-click committable fixes)"
    required: false
    default: 'false'
  show-upgrade-prompt:
    description: "Show GreenOps Dashboard upsell in the PR comment"
    required: false
    default: 'true'
  api-key:
    description: "Optional GreenOps Dashboard API key for telemetry aggregation"
    required: false
runs:
  using: "composite"
  steps:
    - name: Run GreenOps Analysis
      id: run-cli
      shell: bash
      run: |
        # Run once in JSON format — reused for both PR comment and telemetry
        node "${{ github.action_path }}/dist/index.cjs" diff "${{ inputs.plan-file }}" \
          --format json > greenops-result.json

        # Convert JSON result to markdown for the PR comment
        node "${{ github.action_path }}/dist/index.cjs" diff "${{ inputs.plan-file }}" \
          --format markdown \
          --show-upgrade-prompt="${{ inputs.show-upgrade-prompt }}" > greenops-output.md

        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        echo "comment_body<<$EOF" >> "$GITHUB_OUTPUT"
        cat greenops-output.md >> "$GITHUB_OUTPUT"
        echo "$EOF" >> "$GITHUB_OUTPUT"

    - name: Post Inline Suggestions
      if: inputs.post-suggestions == 'true'
      shell: bash
      run: |
        node "${{ github.action_path }}/dist/index.cjs" diff "${{ inputs.plan-file }}" \
          --post-suggestions \
          --github-token="${{ inputs.github-token }}" \
          --repo="${{ github.repository }}" \
          --pr-number="${{ github.event.pull_request.number }}" \
          --commit-sha="${{ github.event.pull_request.head.sha }}"

    - name: Post or Update PR Comment
      uses: actions/github-script@v7
      env:
        GREENOPS_COMMENT_BODY: ${{ steps.run-cli.outputs.comment_body }}
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { owner, repo, number } = context.issue;
          if (!number) return;

          const body = process.env.GREENOPS_COMMENT_BODY;
          if (!body) {
            core.warning('GreenOps: comment body is empty, skipping PR comment.');
            return;
          }

          const comments = await github.rest.issues.listComments({ owner, repo, issue_number: number });
          const existing = comments.data.find(c => c.body.includes('Open GreenOps Methodology Ledger'));

          if (existing) {
            await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
          } else {
            await github.rest.issues.createComment({ owner, repo, issue_number: number, body });
          }

    - name: Upload Telemetry (optional)
      shell: bash
      env:
        GREENOPS_API_KEY: ${{ inputs.api-key }}
      run: |
        # Guard inside the script — composite action 'if' conditions on inputs
        # are unreliable when the input is an empty string vs not set.
        if [ -z "$GREENOPS_API_KEY" ]; then
          echo "[GreenOps] No API key provided — skipping telemetry."
          exit 0
        fi

        jq --arg repo "$GITHUB_REPOSITORY" \
           --arg branch "$GITHUB_HEAD_REF" \
           --arg actor "$GITHUB_ACTOR" \
           --arg sha "$GITHUB_SHA" \
           --arg runId "${GITHUB_RUN_ID}_${{ inputs.plan-file }}" \
           --argjson pr '${{ github.event.pull_request.number || 0 }}' \
           '.result | {
             runId: $runId,
             repo: $repo,
             branch: (if $branch == "" then "main" else $branch end),
             actor: $actor,
             commitSha: $sha,
             prNumber: (if $pr == 0 then null else $pr end),
             analysedAt: .analysedAt,
             ledgerVersion: .ledgerVersion,
             providers: .providers,
             totals: {
               currentCo2eGramsPerMonth: .totals.currentCo2eGramsPerMonth,
               currentEmbodiedCo2eGramsPerMonth: .totals.currentEmbodiedCo2eGramsPerMonth,
               currentLifecycleCo2eGramsPerMonth: .totals.currentLifecycleCo2eGramsPerMonth,
               currentWaterLitresPerMonth: .totals.currentWaterLitresPerMonth,
               currentCostUsdPerMonth: .totals.currentCostUsdPerMonth,
               potentialCo2eSavingGramsPerMonth: .totals.potentialCo2eSavingGramsPerMonth,
               potentialCostSavingUsdPerMonth: .totals.potentialCostSavingUsdPerMonth
             },
             resources: (.resources // []),
             skipped: (.skipped // []),
             resourceCount: (.resources | length),
             recommendationCount: ([.resources[] | select(.recommendation != null)] | length),
             skippedCount: (.skipped | length),
             unsupportedTypes: .unsupportedTypes
           }' greenops-result.json > upload.json

        curl -s -X POST https://getgreenops.com/api/v1/ingest \
          -H "Authorization: Bearer $GREENOPS_API_KEY" \
          -H "Content-Type: application/json" \
          -d @upload.json || true
