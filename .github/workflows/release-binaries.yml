name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun-target: bun-linux-x64
            artifact: greenops-cli-linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun-target: bun-linux-arm64
            artifact: greenops-cli-linux-arm64
          - os: macos-latest
            target: darwin-arm64
            bun-target: bun-darwin-arm64
            artifact: greenops-cli-darwin-arm64
          - os: macos-latest
            target: darwin-x64
            bun-target: bun-darwin-x64
            artifact: greenops-cli-darwin-x64
          - os: windows-latest
            target: windows-x64
            bun-target: bun-windows-x64
            artifact: greenops-cli-windows-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun build cli.ts --compile --target=${{ matrix.bun-target }} --outfile=${{ matrix.artifact }}

      - name: Smoke test (non-Windows)
        if: runner.os != 'Windows'
        run: |
          ./${{ matrix.artifact }} --version
          ./${{ matrix.artifact }} --coverage

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          .\${{ matrix.artifact }} --version
          .\${{ matrix.artifact }} --coverage

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    name: Attach binaries to GitHub Release
    needs: build-binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ./binaries/**/*
          fail_on_unmatched_files: false
