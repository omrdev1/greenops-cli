name: Release Validation
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
        
      - name: Validate Tests (engine + extractor)
        run: npm test
        
      - name: Validate Prepack Build Output
        run: npm run build
        
      - name: Hash Diff Validation 
        # This natively ensures the compiled bundle is precisely identical to source-tracking graphs preventing maliciously injected artifacts statically.
        run: git diff --exit-code dist/index.cjs
        
      - name: CLI Coverage Run Configuration Check
        run: node dist/index.cjs --coverage
