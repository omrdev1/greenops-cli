name: Release Validation
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate Tests (engine + extractor)
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

      - name: Build dist
        run: npm run build

      - name: Verify dist matches committed artifact
        # Rebuilds from source and checks the result matches what was committed.
        # Prevents shipping a stale or manually-tampered bundle.
        # On a fresh tag cut: run `npm run build` locally, commit dist/index.cjs, then tag.
        run: |
          if ! git diff --exit-code dist/index.cjs; then
            echo ""
            echo "ERROR: The committed dist/index.cjs does not match what builds from current source."
            echo "Run 'npm run build' locally, commit the updated dist/index.cjs, then re-tag."
            exit 1
          fi
          echo "dist/index.cjs matches committed artifact ✓"

      - name: CLI smoke test — coverage flag
        run: node dist/index.cjs --coverage

      - name: CLI smoke test — diff with inline fixture
        # Uses an inline fixture so we don't depend on demo.json being present
        # (demo.json is gitignored as an ad-hoc file)
        run: |
          cat > /tmp/smoke-plan.json << 'EOF'
          {
            "resource_changes": [
              {
                "address": "aws_instance.smoke_test",
                "type": "aws_instance",
                "change": {
                  "actions": ["create"],
                  "after": {
                    "instance_type": "m5.large",
                    "region": "us-east-1"
                  }
                }
              }
            ]
          }
          EOF
          node dist/index.cjs diff /tmp/smoke-plan.json --format table
